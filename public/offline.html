<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fc4c02" />
    <title>GearLife offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      body {
        align-items: center;
        background: #fff8f4;
        color: #222;
        display: flex;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        max-width: 420px;
      }

      h1 {
        font-size: 1.75rem;
        line-height: 1.2;
        margin: 0 0 12px;
      }

      p {
        color: #555;
        font-size: 1rem;
        line-height: 1.5;
        margin: 0;
      }

  <body>
    <main>
      <h1>Voce esta offline</h1>
      <p>
        O GearLife precisa de conexao para sincronizar dados com o Strava.
        Tente novamente quando a internet voltar.
      </p>
    </main>
  </body>
</html>
